<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Cleaner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Header -->
        <header class="header">
            <div class="logo">Photo Cleaner</div>
            <div class="controls">
                <button id="browse-btn" class="btn primary">Choose Folder to Scan...</button>
                <span id="current-dir" style="margin-left: 15px; align-self: center; color: var(--text-muted); font-size: 0.9rem;">No folder selected</span>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="exact">Exact Matches</button>
                <button class="tab-btn" data-tab="similar">Similar Matches</button>
            </div>
        </header>

        <!-- Status Area -->
        <div id="status-bar" class="status-bar hidden">
            <div class="status-text" id="status-text">Scanning...</div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <!-- Main Content (Virtual List Container) -->
        <main class="main-content" id="scroll-container">
            <!-- Exact Matches -->
            <div id="tab-exact" class="tab-content active">
                <div style="margin-bottom: 15px; display: flex; justify-content: flex-end;">
                    <button id="auto-dedup-btn" class="btn primary">Deduplicate All</button>
                </div>
                <div id="exact-list" class="virtual-list"></div>
            </div>
            <!-- Similar Matches -->
            <div id="tab-similar" class="tab-content">
                <div style="margin-bottom: 15px; display: flex; justify-content: flex-end;">
                    <button id="similar-auto-dedup-btn" class="btn danger">Delete Unselected</button>
                </div>
                <div id="similar-list" class="virtual-list"></div>
            </div>
        </main>
    </div>

    <!-- Lightbox Modal for Original Image -->
    <div id="lightbox" class="lightbox hidden">
        <div class="lightbox-close">✕</div>
        <div id="lightbox-viewport" class="lightbox-viewport">
            <img id="lightbox-img" src="" alt="Full size" />
        </div>
        <div id="lightbox-info" class="lightbox-info" aria-live="polite">
            <div><span class="lightbox-info-label">File name</span><span id="lightbox-name">—</span></div>
            <div><span class="lightbox-info-label">Date taken</span><span id="lightbox-captured-at">—</span></div>
            <div><span class="lightbox-info-label">File size</span><span id="lightbox-size">—</span></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container" class="toast-container">
        <div id="toast-msg"></div>
        <button id="toast-undo-btn" class="btn">Undo (Ctrl+Z)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
